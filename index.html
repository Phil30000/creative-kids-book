<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#4aa3ff">
<title>Creative Kids Book</title>
<style>
:root {
  --blue:#4aa3ff;
  --blue-dark:#2f95ff;
  --bg:#eef6ff;
  --card:#ffffff;
  --text:#1f2a44;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { margin:0; font-family:"Arial Rounded MT Bold",Arial,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
header { background:linear-gradient(90deg,var(--blue),#7cc7ff); color:white; text-align:center; padding:18px; font-size:26px; font-weight:bold; position:sticky; top:0; z-index:100; }
.container { max-width:1400px; margin:auto; padding:16px; }
.card { background:var(--card); border-radius:18px; padding:18px; margin:20px 0; box-shadow:0 6px 20px rgba(0,0,0,0.08); }
button { background:var(--blue); color:white; border:none; border-radius:14px; padding:14px 18px; margin:5px; cursor:pointer; font-weight:bold; font-size:16px; min-height:48px; }
button:hover { background:var(--blue-dark); }
button:active { transform:scale(0.98); }
input, textarea { width:100%; padding:14px; border-radius:14px; border:1px solid #cfe5ff; font-size:16px; margin-bottom:10px; }
textarea { min-height:60vh; resize:vertical; line-height:1.5; }
.item { background:#f3f8ff; border-radius:12px; padding:14px; margin:8px 0; cursor:pointer; transition:0.2s; display:flex; justify-content:space-between; align-items:center; }
.item:hover { background:#e4f1ff; }
.item button { background:#ff4d4d; margin:0; padding:4px 10px; font-size:14px; border-radius:8px; }
.hidden { display:none; }
.editorLayout { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.previewBox { background:white; padding:16px; border-radius:12px; min-height:60vh; overflow:auto; border:1px solid #e2ecff; }
.chapter { font-size:28px; font-weight:bold; margin:40px 0 20px; break-before:page; }
.chapterList { max-height:200px; overflow:auto; margin:10px 0; border:1px solid #cfe5ff; border-radius:12px; background:#f9faff; padding:10px; }
.chapterList div { padding:6px; cursor:pointer; border-radius:8px; margin:2px 0; }
.chapterList div:hover { background:#e4f1ff; }
@media(max-width:1000px){ .editorLayout { grid-template-columns:1fr; } header { font-size:22px; } button { width:100%; margin:6px 0; } }
@media print{ body{ background:white; } header, .container{ display:none !important; } #printArea{ display:block !important; padding:30px; font-size:14pt; line-height:1.6; } .chapter{ break-before:page; } }
</style>
</head>
<body>
<header>📚 Creative Kids Book</header>
<div class="container">

<!-- PROFILE VIEW -->
<div id="profileView" class="card">
<h2>👶 Profile</h2>
<input id="profileInput" placeholder="Neues Profil">
<button id="createProfileBtn">➕ Profil erstellen</button>
<div id="profileList"></div>
</div>

<!-- BOOK VIEW -->
<div id="bookView" class="card hidden">
<h2>📖 Bücher</h2>
<button id="backBtn">← Profile</button>
<button id="newBookBtn">➕ Neues Buch</button>
<button id="exportBtn">⬇ Export</button>
<button id="importBtn">⬆ Import</button>
<input id="fileImport" type="file" class="hidden">
<button id="printBtn">🖨 Drucken</button>
<div id="bookList"></div>
</div>

<!-- EDITOR VIEW -->
<div id="editorView" class="card hidden">
<h2>✏️ Editor</h2>
<input id="bookTitle" placeholder="Buchtitel">
<div class="editorLayout">
<div>
<textarea id="text"></textarea>
<div>
<button id="chapterBtn">📖 Kapitel einfügen</button>
<button id="saveBtn">💾 Speichern</button>
<button id="closeBtn">❌ Schließen</button>
</div>
<div class="chapterList" id="chapterList"></div>
</div>
<div class="previewBox" id="preview"></div>
</div>
</div>

</div>
<div id="printArea" style="display:none"></div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let profiles = JSON.parse(localStorage.getItem("profiles")) || [];
let currentProfile = null;
let currentBook = null;

// DOM Elemente
const profileInput = document.getElementById("profileInput");
const profileList = document.getElementById("profileList");
const bookList = document.getElementById("bookList");
const preview = document.getElementById("preview");
const text = document.getElementById("text");
const bookTitle = document.getElementById("bookTitle");
const chapterList = document.getElementById("chapterList");
const printArea = document.getElementById("printArea");

const profileView = document.getElementById("profileView");
const bookView = document.getElementById("bookView");
const editorView = document.getElementById("editorView");

// ===== Persistenz =====
function save() {
    localStorage.setItem("profiles", JSON.stringify(profiles));
}

// ===== Buttons =====
document.getElementById("createProfileBtn").addEventListener("click", function(){
    const name = profileInput.value.trim();
    if(!name) return;
    profiles.push({id:Date.now(), name:name, books:[]});
    save(); profileInput.value=""; renderProfiles();
});

document.getElementById("backBtn").addEventListener("click", function(){
    bookView.classList.add("hidden");
    editorView.classList.add("hidden");
    profileView.classList.remove("hidden");
});

document.getElementById("newBookBtn").addEventListener("click", function(){
    if(!currentProfile) return;
    currentProfile.books.push({id:Date.now(), title:"Neues Buch", text:""});
    save(); renderBooks();
});

document.getElementById("saveBtn").addEventListener("click", function(){
    if(!currentBook) return;
    currentBook.title = bookTitle.value;
    currentBook.text = text.value;
    save(); closeEditor();
});

document.getElementById("closeBtn").addEventListener("click", closeEditor);
document.getElementById("chapterBtn").addEventListener("click", insertChapter);
document.getElementById("exportBtn").addEventListener("click", exportData);
document.getElementById("printBtn").addEventListener("click", openPrintSelector);
document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("fileImport").click());
document.getElementById("fileImport").addEventListener("change", importData);
text.addEventListener("input", ()=>{ renderPreview(); autoSave(); });

// ===== Funktionen =====
function renderProfiles() {
    profileList.innerHTML="";
    profiles.forEach((p,i)=>{
        const div = document.createElement("div");
        div.className="item";
        div.innerHTML=`<span>👶 ${p.name}</span>`;
        const delBtn = document.createElement("button");
        delBtn.textContent="🗑";
        delBtn.addEventListener("click", (e)=>{
            e.stopPropagation();
            if(confirm("Profil löschen?")) { profiles.splice(i,1); save(); renderProfiles(); }
        });
        div.appendChild(delBtn);
        div.addEventListener("click", ()=>{
            currentProfile = p;
            profileView.classList.add("hidden");
            bookView.classList.remove("hidden");
            renderBooks();
        });
        profileList.appendChild(div);
    });
}
